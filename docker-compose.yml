services:
  wandb:
    image: wandb/local:latest
    ports:
      - "8080:8080"
    volumes:
      - wandb-data:/vol
    environment:
      - LOCAL_STORAGE_PATH=/vol
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s

volumes:
  wandb-data:
    name: wandb-demo-data
