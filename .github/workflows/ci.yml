name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run task lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run task test

  e2e:
    name: E2E BDD tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Start W&B local server
        run: docker compose up -d --wait

      - name: Provision CI user and write .env
        run: uv run python scripts/ci_setup_wandb.py
        env:
          WANDB_BASE_URL: http://localhost:8080
          WANDB_CI_USERNAME: ${{ secrets.WANDB_CI_USERNAME || 'ci-user' }}
          WANDB_CI_EMAIL: ${{ secrets.WANDB_CI_EMAIL || 'ci@example.com' }}
          WANDB_CI_PASSWORD: ${{ secrets.WANDB_CI_PASSWORD || 'CI_Password123!' }}
          WANDB_PROJECT: wandb-demo
          TICKER: SPY
          LOOKBACK_YEARS: "2"

      - name: Run E2E BDD tests
        run: uv run pytest -m e2e -v

      - name: Stop W&B local server
        if: always()
        run: docker compose down
